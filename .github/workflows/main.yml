name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install pylint pytest

      - name: Rodar pylint
        run: pylint main.py --fail-under=5

      - name: Rodar testes unitários
        run: pytest test_imc.py -v

  deliver:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Simulando Continuous Delivery
        uses: actions/upload-artifact@v4
        with:
          name: projetozipado
          path: |
            **/*.py
            README.md

  notify-discord:
    runs-on: ubuntu-latest
    needs: deliver
    if: github.event_name == 'push'
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Notificar Discord
        uses: Sniddl/discord-commits@v1.8
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          template: "avatar-with-link"
          include-extras: true
          exclude-commits: |
            ^fix:
            ^feat:
          include-footer: false
          note-keywords: |
            Signed-off-by
            Co-authored-by