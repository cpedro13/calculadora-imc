name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar pylint
        run: pip install pylint

      - name: Rodar pylint
        run: pylint imc.py --fail-under=5

  deliver:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Simulando Continuous Delivery
        uses: actions/upload-artifact@v4
        with:
          name: projetozipado
          path: |
            **/*.py
            README.md

name: Discord Commits
uses: Sniddl/discord-commits@v1.8
with:
   webhook: ${{ secrets.DISCORD_WEBHOOK }}
   template: "avatar-with-link"
   include-extras: true
   exclude-commits: |
     ^fix:
     ^feat:
   include-footer: false
   note-keywords: |
     Signed-off-by
     Co-authored-by